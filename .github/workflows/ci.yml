name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  pipeline:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements-tools.txt

      - name: Install tools
        run: pip install -r requirements-tools.txt

      - name: Ensure DuckDB dir
        run: mkdir -p data/duckdb

      - name: Ingest (fixed UTC day for reproducible CI)
        run: python pipelines/ingest_weather_daily.py --date 2024-06-15

      - name: dbt build
        run: python -m dbt.cli.main build --project-dir dbt_project --profiles-dir dbt_project

      - name: dbt docs generate
        run: python -m dbt.cli.main docs generate --project-dir dbt_project --profiles-dir dbt_project

      - name: Upload Pages artifact
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-pages-artifact@v3
        with:
          path: dbt_project/target

  deploy-docs:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: pipeline
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
